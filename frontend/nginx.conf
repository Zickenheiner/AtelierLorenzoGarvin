server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirections relatives (Location sans scheme/hote) : le navigateur les
    # resout sur l'origine courante et conserve donc https + le bon domaine,
    # sans downgrade vers http ni chaine de redirections.
    absolute_redirect off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location ~* (sw\.js|workbox-.*\.js|registerSW\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    # Forme d'URL unique : on retire le slash final (sauf la racine) via une
    # redirection permanente vers la version SANS slash. C'est la forme utilisee
    # par les balises canonical, le sitemap et les liens internes. La redirection
    # est relative ($1, chemin seul) : elle conserve le scheme https et l'hote,
    # et se fait en une seule etape.
    location ~ ^(.+)/$ {
        return 301 $1;
    }

    location / {
        # Sert directement l'index.html imbrique pour les URL sans slash
        # (ex. /contact -> /contact/index.html) avec un code 200, sans passer
        # par le module index de nginx qui ajouterait un slash en 301.
        try_files $uri $uri/index.html /200.html;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
