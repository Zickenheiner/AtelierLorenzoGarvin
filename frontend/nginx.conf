server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Service worker : jamais mis en cache
    location ~* (sw\.js|workbox-.*\.js|registerSW\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    # Routes pré-rendues (fichier, ou dossier/index.html) sinon coquille SPA.
    # IMPORTANT : le fallback est /200.html (coquille VIDE), PAS /index.html
    # (= accueil pré-rendu) — sinon les routes non pré-rendues (ex. /admin)
    # afficheraient l'accueil avec la vraie page montée par-dessus (doublon).
    location / {
        try_files $uri $uri/ /200.html;
    }

    # Cache assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
